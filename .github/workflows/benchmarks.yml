name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      warmup:
        description: Override warmup iterations (blank uses each case default)
        default: ""
        required: false
      iterations:
        description: Override timed iterations (blank uses each case default)
        default: ""
        required: false

permissions:
  contents: read

jobs:
  cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      TYNX_BENCH_DEVICE: github-hosted-ubuntu
      TYNX_BENCH_WARMUP: ${{ inputs.warmup }}
      TYNX_BENCH_ITERATIONS: ${{ inputs.iterations }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: benchmarks
          workspaces: benchmarks -> target
      - name: Record environment
        run: |
          mkdir -p benchmarks/results
          lscpu > benchmarks/results/system.txt
          rustc --version --verbose >> benchmarks/results/system.txt
      - name: Benchmark Tynx CPU
        run: cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p tynx-bench > benchmarks/results/tynx-cpu.json
      - name: Benchmark burn-onnx AOT CPU
        run: cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p burn-aot-bench > benchmarks/results/burn-aot-cpu.json
      - name: Benchmark ONNX Runtime CPU
        run: cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p ort-bench > benchmarks/results/ort-cpu.json
      - name: Benchmark Tynx MatMul CPU
        run: cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p tynx-bench > benchmarks/results/tynx-matmul-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-64x64
      - name: Benchmark burn-onnx AOT MatMul CPU
        run: cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p burn-aot-bench > benchmarks/results/burn-aot-matmul-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-64x64
      - name: Benchmark ONNX Runtime MatMul CPU
        run: cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p ort-bench > benchmarks/results/ort-matmul-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-64x64
      - name: Benchmark 256x256 MatMul CPU
        run: |
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p tynx-bench > benchmarks/results/tynx-matmul-256-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p burn-aot-bench > benchmarks/results/burn-aot-matmul-256-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p ort-bench > benchmarks/results/ort-matmul-256-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-256x256
      - name: Benchmark 512x512 MatMul CPU
        run: |
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p tynx-bench > benchmarks/results/tynx-matmul-512-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p burn-aot-bench > benchmarks/results/burn-aot-matmul-512-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p ort-bench > benchmarks/results/ort-matmul-512-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-512x512
      - name: Benchmark 1024x1024 MatMul CPU
        run: |
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p tynx-bench > benchmarks/results/tynx-matmul-1024-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p burn-aot-bench > benchmarks/results/burn-aot-matmul-1024-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p ort-bench > benchmarks/results/ort-matmul-1024-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-1024x1024
      - name: Benchmark MatMul-Add-ReLU CPU
        run: |
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p tynx-bench > benchmarks/results/tynx-matmul-add-relu-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p burn-aot-bench > benchmarks/results/burn-aot-matmul-add-relu-cpu.json
          cargo run --manifest-path benchmarks/Cargo.toml --locked --release -p ort-bench > benchmarks/results/ort-matmul-add-relu-cpu.json
        env:
          TYNX_BENCH_CASE: matmul-add-relu-256x256
      - name: Add benchmark summary
        if: always() && hashFiles('benchmarks/results/*.json') != ''
        run: |
          echo '## CPU benchmarks' >> "$GITHUB_STEP_SUMMARY"
          echo '| Case | Engine | Median (ms) | p95 (ms) | Estimated GFLOP/s |' >> "$GITHUB_STEP_SUMMARY"
          echo '| --- | --- | ---: | ---: | ---: |' >> "$GITHUB_STEP_SUMMARY"
          jq -s -r '
            sort_by(.case, .engine)[] |
            "| \(.case) | \(.engine) | \(.median_ms * 1000000 | round / 1000000) | \(.p95_ms * 1000000 | round / 1000000) | \(if .estimated_gflops == null then "-" else (.estimated_gflops * 100 | round / 100) end) |"
          ' benchmarks/results/*.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: benchmarks/results
