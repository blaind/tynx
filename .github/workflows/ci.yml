name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Read corpus revision
        id: corpus
        run: echo "revision=$(jq -r .source.revision crates/tynx/tests/conformance.json)" >> "$GITHUB_OUTPUT"
      - name: Cache ONNX corpus
        id: corpus-cache
        uses: actions/cache@v5
        with:
          path: .cache/onnx-corpus/${{ steps.corpus.outputs.revision }}
          key: onnx-corpus-${{ steps.corpus.outputs.revision }}
      - name: Fetch ONNX corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v7
        with:
          repository: tracel-ai/burn-onnx
          ref: ${{ steps.corpus.outputs.revision }}
          path: .cache/onnx-corpus/${{ steps.corpus.outputs.revision }}
          sparse-checkout: crates/onnx-official-tests/vendor/node
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: conformance
      - name: Run ONNX conformance tests
        run: cargo xtask conformance
      - name: Add conformance to job summary
        if: always() && hashFiles('target/conformance-report.json') != ''
        run: |
          echo '## ONNX conformance' >> "$GITHUB_STEP_SUMMARY"
          echo '| Status | Cases |' >> "$GITHUB_STEP_SUMMARY"
          echo '| --- | ---: |' >> "$GITHUB_STEP_SUMMARY"
          jq -r '.summary | to_entries[] | "| \(.key) | \(.value) |"' target/conformance-report.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always() && hashFiles('target/conformance-report.json') != ''
        with:
          name: onnx-conformance
          path: target/conformance-report.json

  coverage:
    runs-on: ubuntu-latest
    env:
      RUST_COVERAGE_THRESHOLD: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Run coverage tests
        run: cargo llvm-cov --workspace --features tynx/training --no-report
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Check coverage threshold
        run: |
          set -o pipefail
          cargo llvm-cov report --fail-under-lines "$RUST_COVERAGE_THRESHOLD" | tee coverage-summary.txt
      - name: Add coverage to job summary
        if: always()
        run: |
          echo '## Rust coverage' >> "$GITHUB_STEP_SUMMARY"
          if [[ -f coverage-summary.txt ]]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Coverage summary unavailable.' >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: lcov.info

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: python
      - name: Create Python environment
        run: python -m venv .venv
      - name: Install Maturin
        run: |
          .venv/bin/python -m pip install "maturin>=1.9,<2"
      - name: Build Python bindings
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/maturin" develop --locked --group test
      - name: Run Python tests
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/python" -m pytest -n auto --maxprocesses 4

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Create Python environment
        run: python -m venv .venv
      - name: Install Python linters
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/python" -m pip install --upgrade "pip>=25.1"
          "$VIRTUAL_ENV/bin/python" -m pip install --group lint
      - name: Ruff
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/ruff" check python tests
          "$VIRTUAL_ENV/bin/ruff" format --check python tests
      - name: Mypy
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/mypy"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --features tynx/training

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: crates/tynx-wasm/npm/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@wasm-pack
      - uses: nanasess/setup-chromedriver@v2
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - run: cargo check --locked -p tynx --target wasm32-unknown-unknown
      - name: Test CPU WASM in Chromium
        run: wasm-pack test --headless --chrome --chromedriver "$(command -v chromedriver)" crates/tynx-wasm --locked --no-default-features --test cpu
      - name: Test WebGPU with SwiftShader
        run: wasm-pack test --headless --chrome --chromedriver "$(command -v chromedriver)" crates/tynx-wasm --locked --features webgpu --test webgpu
      - name: Build WASM for npm
        run: wasm-pack build --dev --target web crates/tynx-wasm --out-dir npm/wasm --locked
      - name: Build and test npm package
        working-directory: crates/tynx-wasm/npm
        run: |
          npm ci
          npm run build
          npm run check
          npm test
          npm pack --dry-run
