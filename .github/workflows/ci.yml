name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Read corpus revision
        id: corpus
        run: echo "revision=$(jq -r .source.revision crates/tynx/tests/conformance.json)" >> "$GITHUB_OUTPUT"
      - name: Cache ONNX corpus
        id: corpus-cache
        uses: actions/cache@v5
        with:
          path: .cache/onnx-corpus/${{ steps.corpus.outputs.revision }}
          key: onnx-corpus-${{ steps.corpus.outputs.revision }}
      - name: Fetch ONNX corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v7
        with:
          repository: tracel-ai/burn-onnx
          ref: ${{ steps.corpus.outputs.revision }}
          path: .cache/onnx-corpus/${{ steps.corpus.outputs.revision }}
          sparse-checkout: crates/onnx-official-tests/vendor/node
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: conformance
      - name: Run ONNX conformance tests
        run: cargo xtask conformance
      - name: Add conformance to job summary
        if: always() && hashFiles('target/conformance-report.json') != ''
        run: |
          echo '## ONNX conformance' >> "$GITHUB_STEP_SUMMARY"
          echo '| Status | Cases |' >> "$GITHUB_STEP_SUMMARY"
          echo '| --- | ---: |' >> "$GITHUB_STEP_SUMMARY"
          jq -r '.summary | to_entries[] | "| \(.key) | \(.value) |"' target/conformance-report.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always() && hashFiles('target/conformance-report.json') != ''
        with:
          name: onnx-conformance
          path: target/conformance-report.json

  coverage:
    runs-on: ubuntu-latest
    env:
      RUST_COVERAGE_THRESHOLD: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Run coverage tests
        run: cargo llvm-cov --workspace --features tynx/training --no-report
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Check coverage threshold
        run: |
          set -o pipefail
          cargo llvm-cov report --fail-under-lines "$RUST_COVERAGE_THRESHOLD" | tee coverage-summary.txt
      - name: Add coverage to job summary
        if: always()
        run: |
          echo '## Rust coverage' >> "$GITHUB_STEP_SUMMARY"
          if [[ -f coverage-summary.txt ]]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Coverage summary unavailable.' >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: lcov.info

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: python
      - name: Create Python environment
        run: python -m venv .venv
      - name: Install Maturin
        run: |
          .venv/bin/python -m pip install "maturin>=1.9,<2"
      - name: Build Python bindings
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/maturin" develop --locked --group test
      - name: Run Python tests
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/python" -m pytest -n auto --maxprocesses 4

  python-vulkan:
    runs-on: ubuntu-latest
    env:
      CUBECL_WGPU_DEFAULT_DEVICE: Cpu
      TYNX_REQUIRE_ACCELERATED: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: python-vulkan
      - name: Install Vulkan software adapter
        run: |
          sudo apt-get update
          sudo apt-get install --yes mesa-vulkan-drivers
      - name: Create Python environment
        run: python -m venv .venv
      - name: Build Vulkan Python bindings
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/python" -m pip install "maturin>=1.9,<2"
          "$VIRTUAL_ENV/bin/maturin" develop --locked --features vulkan --group test
      - name: Run accelerated synchronization and lifetime tests
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/python" -m pytest tests/test_accelerated.py

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Create Python environment
        run: python -m venv .venv
      - name: Install Python linters
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/python" -m pip install --upgrade "pip>=25.1"
          "$VIRTUAL_ENV/bin/python" -m pip install --group lint
      - name: Ruff
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/ruff" check python tests
          "$VIRTUAL_ENV/bin/ruff" format --check python tests
      - name: Mypy
        working-directory: crates/tynx-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          "$VIRTUAL_ENV/bin/mypy"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --features tynx/training

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: crates/tynx-wasm/npm/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@wasm-pack
      - uses: nanasess/setup-chromedriver@v2
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - run: cargo check --locked -p tynx --target wasm32-unknown-unknown
      - name: Test CPU WASM in Chromium
        run: wasm-pack test --headless --chrome --chromedriver "$(command -v chromedriver)" crates/tynx-wasm --locked --no-default-features --test cpu
      - name: Test WebGPU with SwiftShader
        run: wasm-pack test --headless --chrome --chromedriver "$(command -v chromedriver)" crates/tynx-wasm --locked --features webgpu --test webgpu
      - name: Build WASM for npm
        run: wasm-pack build --dev --target web crates/tynx-wasm --out-dir npm/wasm --locked
      - name: Build and test npm package
        working-directory: crates/tynx-wasm/npm
        run: |
          npm ci
          npm run build
          npm run check
          npm test
          npm pack --dry-run

  size:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      WHEEL_MAX_MIB: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: size
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build release wheel with wgpu
        run: |
          pip install maturin
          maturin build --release --features wgpu -m crates/tynx-python/Cargo.toml --out dist
      - name: Build fully-linked release binary
        run: |
          cargo build --release --tests -p tynx --features wgpu
          bin=$(ls -t target/release/deps/conformance-* | grep -v '\.d$' | head -1)
          cp "$bin" conformance-size-probe
          strip conformance-size-probe
      - name: Smoke test wheel without GPU or NumPy
        run: |
          python -m pip uninstall --yes numpy || true
          python -m pip install dist/*.whl
          python - <<'EOF'
          import tynx
          t = tynx.Tensor([1.0, 2.0], requires_grad=True)
          try:
              t.numpy()
          except ModuleNotFoundError as error:
              assert error.name == "numpy", error
          else:
              raise AssertionError("Tensor.numpy() succeeded without NumPy")
          (t * t).sum().backward()
          assert t.grad is not None and t.grad.tolist() == [2.0, 4.0], t.grad
          print("no-GPU fallback ok:", t.grad.tolist())
          EOF
      - name: Report sizes and enforce wheel budget
        run: |
          python - <<'EOF'
          import glob, gzip, os, sys

          def mib(n):
              return f"{n / 1024 / 1024:.1f} MiB"

          wheels = glob.glob("dist/*.whl")
          if not wheels:
              sys.exit("no wheel built")
          wheel = wheels[0]
          wheel_size = os.path.getsize(wheel)

          bin_path = "conformance-size-probe"
          bin_size = os.path.getsize(bin_path)
          with open(bin_path, "rb") as f:
              bin_gz = len(gzip.compress(f.read(), 9))

          rows = [
              "| Artifact (release profile, no LTO) | Size |",
              "| --- | --- |",
              f"| wheel ({os.path.basename(wheel)}) | {mib(wheel_size)} |",
              f"| conformance binary, fully linked, wgpu, stripped | {mib(bin_size)} |",
              f"| conformance binary, gzip -9 | {mib(bin_gz)} |",
          ]
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as f:
                  f.write("### Artifact sizes\n\n" + "\n".join(rows) + "\n")
          print("\n".join(rows))

          limit = int(os.environ["WHEEL_MAX_MIB"]) * 1024 * 1024
          if wheel_size > limit:
              sys.exit(f"wheel exceeds {os.environ['WHEEL_MAX_MIB']} MiB budget")
          EOF
