name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  WHEEL_MAX_MIB: 20

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Read package version
        id: version
        shell: bash
        run: |
          version=$(python3 scripts/check_release.py version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/check_release.py tag "$GITHUB_REF_NAME"

  wheels:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            manylinux: "2_28"
          - os: ubuntu-24.04-arm
            manylinux: "2_28"
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      EXPECTED_VERSION: ${{ needs.preflight.outputs.version }}
      RUSTFLAGS: >-
        --remap-path-prefix=${{ github.workspace }}=tynx
        --remap-path-prefix=/root/.cargo=cargo
        --remap-path-prefix=/home/runner/.cargo=cargo
        --remap-path-prefix=/Users/runner/.cargo=cargo
        --remap-path-prefix=C:\Users\runneradmin\.cargo=cargo
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --profile dist --features wgpu -m crates/tynx-python/Cargo.toml --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}
      - name: Verify wheel artifacts
        shell: bash
        run: >-
          python scripts/check_release.py wheels
          --expected "$EXPECTED_VERSION"
          --max-mib "$WHEEL_MAX_MIB"
          dist/*.whl
      - name: Smoke test wheel
        shell: bash
        env:
          BURN_DEVICE: flex
        run: |
          python -m pip install dist/*.whl
          python scripts/check_release.py smoke --expected "$EXPECTED_VERSION"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [preflight, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*.whl
