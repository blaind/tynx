[advisories]
version = 2

[licenses]
version = 2
allow = ["0BSD", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "MIT", "MPL-2.0", "Unicode-3.0", "Unlicense", "Zlib"]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/gfx-rs/wgpu.git",
    "https://github.com/tracel-ai/burn",
    "https://github.com/tracel-ai/burn-onnx",
    "https://github.com/tracel-ai/cubecl",
    "https://github.com/tracel-ai/cubek",
    "https://github.com/tracel-ai/tracel-llvm",
]
